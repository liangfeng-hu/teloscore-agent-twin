version: "3.9"

services:
  teloscore-agent-twin:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -lc "pip install -r requirements.txt &&
              uvicorn api.app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEFAULT_MODE: agent_os
      DEFAULT_USER_ID: user_001
      EVERMEMOS_BASE_URL: http://host.docker.internal:1995
      LOCAL_MEMORY_PATH: /app/.local_memory/memory.jsonl
